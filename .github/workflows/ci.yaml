name: CI

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Clippy
        run: cargo clippy

      - name: Format
        run: cargo fmt --check

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v6

      - name: Test
        run: cargo test
